<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonteverde 4Q FA2</title>
</head>
<body>
    <h2>Appointment Booking Form</h2>
    
<form onsubmit="return printSummary();"> 
    <!-- Patient's full name -->
    <label for="fname">Patient Name:</label><br>
    <input type="text" id="fname" name="fname" required><br>
    <!-- Patient's ID num -->
    <label for="idnum">ID #:</label><br>
    <input type="text" id="idnum" name="idnum" required> <br><br>
    <!-- Service options -->
    <label for="serv">Service:</label>
    <select name="serv" id="serv">
    <option value="dental">Dental Check-up (PHP 850)</option>
    <option value="eye">Eye Check-up (PHP 900)</option>
    <option value="phys">Physical Exam (PHP 800)</option>
    </select> <br> 
    <!-- Num of sessions needed -->
    <label for="sess">Sessions (Max of 3):</label>
    <input type="number" id="sess" name="sess" min="1" max="3"> <br><br> 
    <!-- Customer type -->
    <label for="type">Customer Type:</label>
    <select id="custype" name="type">
    <option value="reg">Regular</option>
    <option value="pwd">PWD</option>
    <option value="sen">Senior</option> <br>
    </select>

    <!-- Submit buton -->
    <br><br><button type="submit">Book Appointment</button>
</form>

<br><h2>APPOINTMENT SUMMARY</h2>
    <p id="demo1"> </p>
    <p id="demo2"> </p>
    <p id="demo3"></p>
    <p id="demo4"></p>
    <p id="demo5"></p>
    <p id="demo6"></p>
    <p id="demo7"></p>
    <p id="demo8"></p>

<script>
function calculateSubtotal(serv, sess) {
    var price;
    // Find return price by the selected service
    switch (serv) {
        case "dental":
            price = 850;
            break;
        case "eye":
            price = 900;
            break;
        case "phys":
            price = 800;
            break;
        default:
            return "Service not found."; 
        }
        return price * sess; //Price multiplied by amount of sessions
}

function calculateDiscount(total, type) {
    // PWD/Sen gets 15% discount, 0 for regular customers
    if (type === "pwd" || type === "sen") {
        return total * 0.15;
    } else {
        return 0;
    }
}

function printSummary() {
//Calculate the payment 
var subtotal = calculateSubtotal(serv.value, sess.value); 
var discount = calculateDiscount(subtotal, custype.value);
var total2 = subtotal - discount;

//Print the service label 
var serviceLabel = "";
if (serv === "dental") {
    serviceLabel = "Dental Check-up (PHP 850)";
} else if (serv ==="eye") {
    serviceLabel = "Dental Check-up (PHP 850)";
} else if (serv === "phys") {
    serviceLabel = "Physical Exam (PHP 800)";
}

//Display the final appointment summary 
demo1.innerHTML = "Name: " + fname.value; 
demo2.innerHTML = "Grade & Section: " + idnum.value; 
demo3.innerHTML = "Order: " + serviceLabel; 
demo4.innerHTML = "Quantity: " + sess.value; 
demo5.innerHTML = "Subtotal: PHP " + subtotal.toFixed(2); //So price has 2 decimals
demo6.innerHTML = "Discount: PHP " + discount.toFixed(2); 
demo7.innerHTML = "Total: PHP " + total2.toFixed(2); 

demo8.innerHTML = "Thank you for booking with us!"; 
return false;
}

</script>
</body>
</html>
